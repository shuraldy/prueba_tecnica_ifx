<div class="min-h-screen flex items-center justify-center p-4 transition-colors duration-200"
     style="background-color: var(--bg-base)">

  <!-- Background glow -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 rounded-full blur-3xl opacity-30 dark:opacity-10"
         style="background-color: var(--brand)"></div>
  </div>

  <div class="relative w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4 shadow-lg"
           style="background-color: var(--brand)">
        <i class="pi pi-server text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold" style="color: var(--text-primary)">VM Manager</h1>
      <p class="text-sm mt-1" style="color: var(--text-secondary)">Inicia sesión para continuar</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl border p-8 shadow-xl transition-colors duration-200"
         style="background-color: var(--bg-surface); border-color: var(--border)">

      @if (error()) {
        <p-message severity="error" [text]="error()" styleClass="w-full mb-6" />
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

        <!-- Email -->
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium" style="color: var(--text-secondary)">Email</label>
          <input pInputText formControlName="email" type="email" placeholder="admin@ifx.com"
                 class="w-full input-field rounded-lg px-3 py-2 border transition-colors"
                 [class.!border-red-500]="fieldError('email')" />
          @if (fieldError('email')) {
            <span class="text-xs text-red-500">Ingresa un email válido</span>
          }
        </div>

        <!-- Password -->
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium" style="color: var(--text-secondary)">Contraseña</label>
          <p-password formControlName="password" [feedback]="false" [toggleMask]="true"
                      placeholder="••••••••" styleClass="w-full"
                      inputStyleClass="w-full input-field"
                      [class.!border-red-500]="fieldError('password')" />
          @if (fieldError('password')) {
            <span class="text-xs text-red-500">Mínimo 6 caracteres</span>
          }
        </div>

        <p-button type="submit" label="Iniciar sesión" icon="pi pi-sign-in"
                  styleClass="w-full mt-2"
                  [loading]="loading()" [disabled]="loading()" />

      </form>

      <!-- Credentials hint -->
      <div class="mt-6 pt-5 border-t" style="border-color: var(--border)">
        <p class="text-xs text-center mb-3" style="color: var(--text-muted)">Credenciales de prueba</p>
        <div class="grid grid-cols-2 gap-2 text-xs" style="color: var(--text-secondary)">
          <div class="rounded-lg p-2.5 border" style="background-color: var(--bg-elevated); border-color: var(--border)">
            <p class="font-semibold mb-1" style="color: var(--text-primary)">Administrador</p>
            <p>admin&#64;ifx.com</p>
            <p style="color: var(--text-muted)">Admin123!</p>
          </div>
          <div class="rounded-lg p-2.5 border" style="background-color: var(--bg-elevated); border-color: var(--border)">
            <p class="font-semibold mb-1" style="color: var(--text-primary)">Cliente</p>
            <p>cliente&#64;ifx.com</p>
            <p style="color: var(--text-muted)">Cliente123!</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <app-toast />
</div>
